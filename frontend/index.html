<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Auto Responder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-2xl">

        <!-- Title -->
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">
            📧 AI Email Auto-Responder
        </h1>

        <!-- Input -->
        <textarea 
            id="email"
            placeholder="Type your email here..."
            class="w-full h-40 p-4 border rounded-xl focus:ring-2 focus:ring-blue-500 mb-4"
        ></textarea>

        <!-- Button -->
        <button 
            id="btn"
            onclick="sendEmail()"
            class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition"
        >
            Generate Reply
        </button>

        <!-- Output -->
        <div class="mt-6 space-y-3">

            <div class="bg-gray-50 p-3 rounded-lg">
                <strong>Intent:</strong>
                <p id="intent"></p>
            </div>

            <div class="bg-gray-50 p-3 rounded-lg">
                <strong>Tone:</strong>
                <p id="tone"></p>
            </div>

            <div class="bg-blue-50 p-4 rounded-lg">
                <strong>Generated Response:</strong>
                <p id="response" class="mt-1"></p>
            </div>

        </div>

    </div>

<script src="script.js"></script>
</body>
</html>
